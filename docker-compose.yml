services:
  elasticsearch:
    image: elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - EMBEDDING_DEVICE=cuda
      - ADMIN_API_KEY=${ADMIN_API_KEY:-change-me-in-production}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      elasticsearch:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    volumes:
      - ./src/ui:/app/src/ui
    environment:
      - API_URL=http://api:8000
      - TENANT_NAME=${TENANT_NAME:-}
      - API_KEY_DEFAULT=${API_KEY_DEFAULT:-}
      - API_REQUEST_TIMEOUT=${API_REQUEST_TIMEOUT:-600}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
    depends_on:
      - api

volumes:
  es_data:
